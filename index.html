<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunflower Field</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="not-loaded">

<div class="sky">
    <div class="sun"></div>
</div>

<div class="field">

    <div class="sunflower sunflower1">
        <div class="head">
            <div class="petals">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="center"></div>
        </div>

        <div class="stem">
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
    </div>

    <div class="sunflower sunflower2">
        <div class="head">
            <div class="petals">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="center"></div>
        </div>

        <div class="stem">
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
    </div>

    <div class="sunflower sunflower3">
        <div class="head">
            <div class="petals">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="center"></div>
        </div>

        <div class="stem">
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
