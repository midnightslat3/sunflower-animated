<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Sunflower</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        to bottom,
        #87CEEB 0%,
        #87CEEB 70%,
        #7ec850 70%,
        #5da130 100%
    );
}

.sunflower{
    position:relative;
    width:250px;
    height:450px;
    transform-origin:bottom center;
    animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
    0%,100%{transform:rotate(-3deg);}
    50%{transform:rotate(3deg);}
}

/* Stem */
.stem{
    position:absolute;
    bottom:0;
    left:50%;
    width:16px;
    height:260px;
    background:#2f8f2f;
    transform:translateX(-50%);
    border-radius:10px;
}

/* Leaves */
.leaf{
    position:absolute;
    width:80px;
    height:40px;
    background:#3ca53c;
    border-radius:0 100% 0 100%;
}

.leaf.left{
    bottom:120px;
    left:40px;
    transform:rotate(-35deg);
}

.leaf.right{
    bottom:170px;
    right:40px;
    transform:rotate(145deg);
}

/* Flower Head */
.flower{
    position:absolute;
    top:20px;
    left:50%;
    width:180px;
    height:180px;
    transform:translateX(-50%);
}

/* Petals */
.petals{
    position:absolute;
    width:100%;
    height:100%;
    animation:spin 15s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.petal{
    position:absolute;
    width:40px;
    height:90px;
    background:#f9c300;
    border-radius:50%;
    left:70px;
    top:-5px;
    transform-origin:20px 95px;
}

/* Center */
.center{
    position:absolute;
    width:90px;
    height:90px;
    background:#5a381e;
    border-radius:50%;
    top:45px;
    left:45px;
    z-index:10;
    box-shadow:
        inset 0 0 10px rgba(0,0,0,.4),
        0 0 20px rgba(0,0,0,.15);
}

/* Sun */
.sun{
    position:absolute;
    top:40px;
    right:60px;
    width:100px;
    height:100px;
    background:#ffd54f;
    border-radius:50%;
    box-shadow:0 0 40px #ffd54f;
}
</style>
</head>
<body>

<div class="sun"></div>

<div class="sunflower">
    <div class="flower">
        <div class="petals" id="petals"></div>
        <div class="center"></div>
    </div>

    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
</div>

<script>
const petalsContainer = document.getElementById('petals');

for(let i=0; i<20; i++){
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.style.transform = `rotate(${i * 18}deg)`;
    petalsContainer.appendChild(petal);
}
</script>

</body>
</html>
